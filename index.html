<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Datos Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007BFF; color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 16px; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Validación de Datos Exactos</h2>

    <div class="form-group">
        <label>1. Cargar archivo Excel:</label>
        <input type="file" id="archivoExcel" accept=".xlsx, .xls">
    </div>

    <div class="form-group">
        <label>2. Nombre de la columna a validar (en el Excel):</label>
        <input type="text" id="nombreColumna" placeholder="Ejemplo: Codigo_ID">
    </div>

    <div class="form-group">
        <label>3. Datos para la validación (Pega aquí la lista de datos exactos, uno por línea):</label>
        <textarea id="datosReferencia" rows="8" placeholder="Dato1&#10;Dato2&#10;Dato3"></textarea>
    </div>

    <button id="btnComparar">Comparar y Descargar</button>

    <script>
        document.getElementById('btnComparar').addEventListener('click', function() {
            const archivoInput = document.getElementById('archivoExcel');
            const nombreColumna = document.getElementById('nombreColumna').value.trim();
            const datosReferenciaRaw = document.getElementById('datosReferencia').value;

            // Validaciones previas
            if (archivoInput.files.length === 0) return alert("Por favor, sube un archivo Excel.");
            if (!nombreColumna) return alert("Por favor, escribe el nombre de la columna.");
            if (!datosReferenciaRaw) return alert("Por favor, ingresa los datos de validación.");

            // Limpiamos los datos de referencia: los separamos por saltos de línea y quitamos espacios extra
            const arrayReferencia = datosReferenciaRaw.split('\n')
                                                      .map(dato => dato.trim())
                                                      .filter(dato => dato !== "");

            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // Tomamos la primera hoja del Excel
                const primeraHoja = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[primeraHoja];

                // Convertimos la hoja a un arreglo de objetos JSON
                let jsonExcel = XLSX.utils.sheet_to_json(worksheet);

                // Verificamos si la columna existe en la primera fila
                if (jsonExcel.length > 0 && !(nombreColumna in jsonExcel[0])) {
                    return alert("No se encontró la columna '" + nombreColumna + "' en el Excel. Verifica las mayúsculas/minúsculas.");
                }

                // Procesamos cada fila para la comparación EXACTA
                jsonExcel = jsonExcel.map(fila => {
                    // Obtenemos el valor de la celda y lo convertimos a texto para asegurar la exactitud
                    const valorCelda = fila[nombreColumna] !== undefined ? String(fila[nombreColumna]).trim() : "";
                    
                    // Comparamos si el valor existe en nuestra lista de referencia
                    const esValido = arrayReferencia.includes(valorCelda);

                    // Añadimos la nueva columna con el resultado
                    fila['Estado de Validación'] = esValido ? 'DIGITALIZADO' : 'NO DIGITALIZADO';
                    
                    return fila;
                });

                // Convertimos el JSON actualizado de vuelta a una hoja de Excel
                const nuevaHoja = XLSX.utils.json_to_sheet(jsonExcel);
                const nuevoWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(nuevoWorkbook, nuevaHoja, "Resultados");

                // Descargamos el archivo
                XLSX.writeFile(nuevoWorkbook, "Excel_Validado.xlsx");
            };

            // Leemos el archivo cargado
            reader.readAsArrayBuffer(archivoInput.files[0]);
        });
    </script>
</body>
</html>
